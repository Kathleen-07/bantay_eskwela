name: bantay_eskwela
description: "BantayEskwela - Mobile-Based Student Identification and Parent Monitoring System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Local key-value storage (unread badge timestamps)
  shared_preferences: ^2.3.2

  # Input Validation
  form_builder_validators: ^11.1.0

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # QR Code Generation
  qr_flutter: ^4.1.0

  # File Picker (for consent uploads & photo)
  file_picker: ^8.0.0+1

  # Image Picker (for student photos - better web support)
  image_picker: ^1.1.2

  # Date Formatting
  intl: 0.20.2

  # UUID Generation
  uuid: ^4.5.1

  # HTTP for Cloudinary uploads
  http: ^1.2.1

  # Digital signature pad (consent signing)
  signature: ^5.5.0

  # Open external URLs (PDF consent forms)
  url_launcher: ^6.3.0

  # Screenshot capture for ID card download
  screenshot: ^3.0.0

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# App icon generation — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  # White background fill behind the icon on adaptive (Android 8+) launchers
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  # Web favicon + PWA install icons
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#1B5E33"

flutter:
  uses-material-design: true
  assets:
    - assets/images/santa_ana_logo.png
