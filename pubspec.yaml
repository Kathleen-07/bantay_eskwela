name: bantay_eskwela
description: "BantayEskwela - Mobile-Based Student Identification and Parent Monitoring System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Input Validation
  form_builder_validators: ^11.1.0

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # QR Code Generation
  qr_flutter: ^4.1.0

  # File Picker (for consent uploads & photo)
  file_picker: ^8.0.0+1

  # Image Picker (for student photos - better web support)
  image_picker: ^1.1.2

  # Date Formatting
  intl: 0.20.2

  # UUID Generation
  uuid: ^4.5.1

  # HTTP for Cloudinary uploads
  http: ^1.2.1

  # Screenshot capture for ID card download
  screenshot: ^3.0.0

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/santa_ana_logo.png
